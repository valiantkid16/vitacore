<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – VitaCore</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<canvas id="bg-canvas"></canvas>
<!-- Glow accents -->
<div style="position:fixed;top:-150px;right:-150px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,245,160,.06),transparent 70%);pointer-events:none;z-index:0"></div>
<div style="position:fixed;bottom:-100px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,255,.05),transparent 70%);pointer-events:none;z-index:0"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">VITA<span>CORE</span></div>
    <div class="auth-tag">HEALTH INTELLIGENCE PLATFORM</div>

    <div class="auth-tab-bar">
      <div class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Sign In</div>
      <div class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Create Account</div>
    </div>

    <!-- Login -->
    <div id="form-login" class="auth-form">
      <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" value="kiran@vitacore.app"/></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" value="••••••••"/></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;font-size:.85rem">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer"><input type="checkbox" checked style="accent-color:var(--green)"/> Remember me</label>
        <a href="#" style="color:var(--green)">Forgot password?</a>
      </div>
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-control">
          <option>User</option>
          <option>Nutritionist</option>
          <option>Admin</option>
        </select>
      </div>
      <button class="btn-auth" onclick="window.location.href='dashboard.html'">Sign In →</button>
      <div class="auth-divider">or continue with</div>
      <div class="social-row">
        <button class="social-btn">🔵 Google</button>
        <button class="social-btn">🍎 Apple</button>
      </div>
      <p style="text-align:center;font-size:.82rem;color:var(--muted);margin-top:1.5rem">Don't have an account? <a href="#" onclick="switchAuthTab('register')" style="color:var(--green)">Sign up free</a></p>
    </div>

    <!-- Register -->
    <div id="form-register" class="auth-form" style="display:none">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-control" placeholder="Kiran"/></div>
        <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-control" placeholder="Kumar"/></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="kiran@example.com"/></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" placeholder="Min 8 characters"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Role</label><select class="form-control"><option>User</option><option>Nutritionist</option></select></div>
        <div class="form-group"><label class="form-label">Health Goal</label><select class="form-control"><option>Weight Loss</option><option>Muscle Gain</option><option>Maintenance</option><option>Diabetic Care</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Height (cm)</label><input type="number" class="form-control" placeholder="174"/></div>
        <div class="form-group"><label class="form-label">Weight (kg)</label><input type="number" class="form-control" placeholder="72"/></div>
      </div>
      <div style="margin-bottom:1.2rem;font-size:.82rem;color:var(--muted)">
        <label style="display:flex;align-items:flex-start;gap:.6rem;cursor:pointer">
          <input type="checkbox" style="accent-color:var(--green);margin-top:2px"/>
          I agree to the <a href="#" style="color:var(--green)">Terms</a> &amp; <a href="#" style="color:var(--green)">Privacy Policy</a>
        </label>
      </div>
      <button class="btn-auth" onclick="window.location.href='dashboard.html'">Create Account →</button>
      <p style="text-align:center;font-size:.82rem;color:var(--muted);margin-top:1.5rem">Already have an account? <a href="#" onclick="switchAuthTab('login')" style="color:var(--green)">Sign in</a></p>
    </div>
  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
